name: Release

# Builds the sdist plus real binary wheels (Linux/Windows/macOS) and publishes
# them to PyPI through Trusted Publishing when a version tag is pushed.
#
# One-time setup on PyPI: project settings -> Publishing -> add a GitHub
# publisher for this repository with workflow "release.yml" and environment
# "pypi". No API token is stored in the repository.
#
# Never upload a locally built wheel: on a machine without a compiler,
# setuptools still tags the wheel as platform-specific even though the
# optional accelerator failed to build, which would shadow the sdist for
# every user of that platform.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build twine
      - run: python -m build --sdist
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pypa/cibuildwheel@v4.1
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
